name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  linux_x64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      - name: Install PyInstaller
        run: |
          source .venv/bin/activate
          pip install pyinstaller
      - name: Build Linux executable
        run: |
          bash tools/build_executable.sh
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: RiiTag-RPC_Linux_x64
          path: dist/start

linux_arm64:
  name: Build Linux ARM64
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4
    - name: Build on ARM64 using arm-runner
      uses: pguyot/arm-runner-action@v2
      with:
        base_image: raspios_lite_arm64:bookworm
        cpu: cortex-a53
        cpu_info: cpuinfo/raspberrypi_4b
        bind_mount_repository: true
        commands: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3 python3-venv python3-full
          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --onefile \
            --add-data "banner.txt:." \
            --add-data "config.json:." \
            start.py
    - name: Upload ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: RiiTag-RPC_Linux_ARM64
        path: dist/start

  macos_x64:
    name: Build macOS x64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
          key: macos-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            macos-pip-
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      - name: Install PyInstaller
        run: |
          source .venv/bin/activate
          pip install pyinstaller
      - name: Build macOS executable
        run: |
          source .venv/bin/activate
          pyinstaller --onefile --add-data "banner.txt:." --add-data "config.json:." start.py
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: RiiTag-RPC_MacOS_x64
          path: dist/riitag-rpc


  windows_x64:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Setup venv
        run: |
          python -m venv .venv
      - name: Install dependencies
        shell: pwsh
        run: |
          .\.venv\Scripts\activate.ps1
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      - name: Install PyInstaller
        shell: pwsh
        run: |
          .\.venv\Scripts\activate.ps1
          pip install pyinstaller
      - name: Build Windows executable
        shell: pwsh
        run: |
          .\.venv\Scripts\activate.ps1
          pyinstaller --onefile --add-data "banner.txt;." --add-data "config.json;." start.py
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: RiiTag-RPC_Windows_x64
          path: dist/start.exe

  Publish_and_Release:
    name: Publish and Release (All Artifacts)
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download per-target artifacts
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-22.04-x64
          path: ubuntu22
        continue-on-error: true
      - name: Download per-target artifacts (ARM64)
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-24.04-x64
          path: ubuntu24
        continue-on-error: true
      - name: Download per-target artifacts (macOS)
        uses: actions/download-artifact@v4
        with:
          name: macos-13-x64
          path: macos
        continue-on-error: true
      - name: Download per-target artifacts (Windows)
        uses: actions/download-artifact@v4
        with:
          name: windows-2022-x64
          path: Windows
        continue-on-error: true
      - name: Collect artifacts into releases
        run: |
          mkdir -p releases
          cp -r ubuntu22 releases/linux_x64
          cp -r ubuntu24 releases/linux_arm64
          cp -r macos releases/macOS_x64
          cp -r Windows releases/windows_x64
      - name: Create all-artifacts tarball
        id: tar
        run: |
          tar_args=()
          if [ -f releases/linux_x64/start ]; then tar_args+=("-C" "releases/linux_x64" "start"); fi
          if [ -f releases/linux_arm64/start ]; then tar_args+=("-C" "releases/linux_arm64" "start"); fi
          if [ -f releases/macOS_x64/riitag-rpc ]; then tar_args+=("-C" "releases/macOS_x64" "riitag-rpc"); fi
          if [ -f releases/windows_x64/riitag-rpc.exe ]; then tar_args+=("-C" "releases/windows_x64" "riitag-rpc.exe"); fi
          if [ ${#tar_args[@]} -gt 0 ]; then tar -cjf all-artifacts.tar.bz2 "${tar_args[@]}"; echo "artifact_exists=true" >> $GITHUB_OUTPUT; else echo "artifact_exists=false" >> $GITHUB_OUTPUT; fi
      - name: Publish all-artifacts tarball
        if: steps.tar.outputs.artifact_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: all-artifacts
          path: all-artifacts.tar.bz2
      - name: Set up release metadata
        run: |
          echo "REPOSITORY_NAME=$(basename $GITHUB_REPOSITORY)" >> $GITHUB_ENV
          echo "DATETIME=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
      - name: Create release
        if: steps.tar.outputs.artifact_exists == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.REPOSITORY_NAME }}-${{ env.DATETIME }}
          draft: false
          prerelease: true
          generate_release_notes: true
          name: Nightly-${{ env.REPOSITORY_NAME }}-${{ env.DATETIME }}
          files: all-artifacts.tar.bz2
